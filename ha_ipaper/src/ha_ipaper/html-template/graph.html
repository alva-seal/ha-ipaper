<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeassistant Interactive ePaper: Graph</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background: #fff;
        }

        .top-bar {
            text-align: right;
            margin-bottom: 10px;
            margin-right: 15px;
        }

        .close-button {
            font-size: 1.5em;
            text-decoration: none;
            color: black;
            padding: 4px;
        }

        .graph-container {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="javascript:history.back()" class="close-button">X</a>
    </div>

    <div class="graph-container">
        <h3><script>
            const title = "{{ request.query_params.get('sensor') }}".replace(/_/g, " ");
            document.write(title.charAt(0).toUpperCase() + title.slice(1));
        </script></h3>

        <!-- Static image or server-rendered SVG -->
        
        <object
            data="graph.svg?sensor={{ request.query_params.get('sensor') }}"
            type="image/svg+xml"
            width="100%"
            style="height: auto;">
        </object>
    </div>
    <center><button onclick="javascript:history.back()" class="close-button">Close</button></center>
</body>
</html>
