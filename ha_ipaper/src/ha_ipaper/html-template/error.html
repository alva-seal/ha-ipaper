<html>
<head>
	<meta http-equiv="refresh" content="60">
	<title>Homeassistant Interactive ePaper</title>
	<style>
        .refresh-button {
            font-size: 1.5em;
            text-decoration: none;
            color: black;
            padding: 4px;
        }
    </style>
</head>
<body>
	<h1>{{title}}</h1>
	<p>Parameters: {{ parameters }}</p>
	<p>Error: {{error_message}}</p>
	<p>Stack trace:</p>
	<pre>{{ stacktrace | e }}</pre>
	<p>Refreshing in 60s...</p>
	<center><button onclick="location.reload()" class="refresh-button">Refresh Now</button></center>
</body>
